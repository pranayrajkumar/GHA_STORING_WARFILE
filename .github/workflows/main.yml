name: Build on Push

on:
  pull_request:
    branches:
    - main

jobs:
  pr-build:
    runs-on: ubuntu-latest

    steps:
    - name: checkout code
      uses: actions/checkout@v4
    - name: settingup java
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 21

    - run: mvn clean package

    - name: upload WAR artifact
      uses: actions/upload-artifact@v4
      with:
        name: demo-war
        path: target/*.war
